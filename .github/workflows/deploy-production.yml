name: Promote to Production

# Manual trigger only — build, test, and deploy to production
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    steps:
      - name: Confirm deployment
        if: inputs.confirm != 'deploy'
        run: |
          echo "::error::Confirmation failed. Type 'deploy' to confirm."
          exit 1

  build_and_deploy:
    needs: validate
    runs-on: ubuntu-latest
    name: Build, Test & Deploy to Production
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          fetch-depth: 1

      - name: Test API functions
        working-directory: api
        run: |
          npm ci
          npm test

      - name: Pre-build API
        working-directory: api
        run: |
          npm run build
          npm prune --production

      - name: Pre-build frontend
        env:
          BUILD_NUM: ${{ github.run_number }}
        run: |
          npm ci
          npm run build
          APP_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).appVersion || '1.0'")
          echo "{\"version\":\"${APP_VERSION}.${BUILD_NUM}\"}" > dist/version.json
          cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy to Production SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PRODUCTION }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "dist"
          api_location: "api"
          output_location: ""

      - name: Smoke test production
        run: |
          sleep 10
          node scripts/smoke-test.mjs ${{ vars.PRODUCTION_URL }}
