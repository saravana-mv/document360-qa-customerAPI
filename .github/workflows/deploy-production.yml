name: Promote to Production

# Manual trigger only — select which production environment(s) to deploy to
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production-a
          - production-b
          - both
      confirm:
        description: "Type 'deploy' to confirm"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    steps:
      - name: Confirm deployment
        if: inputs.confirm != 'deploy'
        run: |
          echo "::error::Confirmation failed. Type 'deploy' to confirm."
          exit 1

  build:
    needs: validate
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          fetch-depth: 0

      - name: Test API functions
        working-directory: api
        run: |
          npm ci
          npm test

      - name: Pre-build API
        working-directory: api
        run: |
          npm run build
          npm prune --production

      - name: Pre-build frontend
        run: |
          npm ci
          npm run build
          APP_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).appVersion || '1.0'")
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "{\"version\":\"${APP_VERSION}.${BUILD_NUM}\"}" > dist/version.json
          cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            api/
            scripts/
          retention-days: 1

  deploy-production-a:
    needs: build
    if: inputs.environment == 'production-a' || inputs.environment == 'both'
    runs-on: ubuntu-latest
    name: Deploy to Production A
    environment: production-a
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Deploy to Production A SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PRODUCTION_A }}
          action: "upload"
          skip_app_build: true
          app_location: "dist"
          api_location: "api"
          output_location: ""

      - name: Smoke test Production A
        run: |
          sleep 10
          node scripts/smoke-test.mjs ${{ vars.PRODUCTION_A_URL }}

  deploy-production-b:
    needs: build
    if: inputs.environment == 'production-b' || inputs.environment == 'both'
    runs-on: ubuntu-latest
    name: Deploy to Production B
    environment: production-b
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Deploy to Production B SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_PRODUCTION_B }}
          action: "upload"
          skip_app_build: true
          app_location: "dist"
          api_location: "api"
          output_location: ""

      - name: Smoke test Production B
        run: |
          sleep 10
          node scripts/smoke-test.mjs ${{ vars.PRODUCTION_B_URL }}
