name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Run API unit tests before deploying so broken function logic is caught early
      - name: Test API functions
        working-directory: api
        run: |
          npm ci
          npm test

      # Pre-build API with esbuild and prune devDependencies to stay under 250MB SWA limit
      - name: Pre-build API
        working-directory: api
        run: |
          npm run build
          npm prune --production

      # Pre-build the frontend here (instead of letting Oryx build it during
      # the SWA upload step). Oryx has intermittently produced an index.html
      # that still references /src/main.tsx (the Vite dev entry) instead of
      # the built /assets/index-*.js bundle, which causes a white screen +
      # "application/octet-stream" MIME error for module scripts. Building
      # locally and passing skip_app_build: true guarantees dist/ is what
      # gets deployed.
      - name: Pre-build frontend
        run: |
          npm ci
          npm run build
          # Write version.json so the running app can detect newer deployments
          APP_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).appVersion || '1.0'")
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "{\"version\":\"${APP_VERSION}.${BUILD_NUM}\"}" > dist/version.json
          # app_location: "dist" means SWA looks for staticwebapp.config.json
          # inside dist/. Copy it in from the repo root.
          cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_FLOWER_0E2E3BD10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          skip_app_build: true
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "dist" # Pre-built app content path (skip_app_build: true)
          api_location: "api" # Api source code path - optional
          output_location: "" # Not used when skip_app_build is true
          # staticwebapp.config.json lives at the repo root (SWA's default
          # config_file_location is app_location). Do NOT move it into /public
          # or set config_file_location: "dist" — the SWA action validates the
          # config file path BEFORE running the app build, so dist/ doesn't
          # exist yet at that point.
          ###### End of Repository/Build Configurations ######

      # Smoke-test the live deployment — catches routing and 404 issues immediately
      - name: Smoke test deployed endpoints
        run: |
          # Wait briefly for Azure SWA to finish propagating the deployment
          sleep 10
          node scripts/smoke-test.mjs https://jolly-flower-0e2e3bd10.1.azurestaticapps.net

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_FLOWER_0E2E3BD10 }}
          action: "close"
